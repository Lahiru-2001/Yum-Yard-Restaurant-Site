 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kavoon&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/login.css">
</head>

<body>
    <!-- Login Form -->
    <div class="container" id="loginContainer">
        <div id="loginForm">
            <div class="logo">
                <img src="/assets/images/logo 2.png" alt="Logo">
            </div>

            <h2>Welcome Back</h2>
            <p>Enter your Credentials to access your account</p>

            <div class="input-group">
                <div class="label">Username:-</div>
                <input type="text" id="loginUsername" placeholder="Enter your username">
            </div>

            <div class="input-group">
                <div class="label">Password:-</div>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>

            <button onclick="login()">Login</button>

            <div class="switch"> Don’t have an account? <a onclick="showRegister()">Sign Up</a> </div>

        </div>
    </div>


    <!-- Register Form -->
    <section id="register_Form">
        <div class="container-register hidden" id="registerForm">

            <div class="logo">
                <img src="/assets/images/logo 2.png" alt="Logo">
            </div>

            <h2>Get Started Now</h2>
            <p>Enter your Details for sing up</p>

            <div class="form-grid">

                <div class="field">
                    <label>Username:-</label>
                    <input type="text" id="regUsername" placeholder="Enter your username">
                </div>

                <div class="field">
                    <label>Email Address:-</label>
                    <input type="email" id="regEmail" placeholder="Enter your email">
                </div>

                <div class="field">
                    <label>Confirm Email Address:-</label>
                    <input type="email" id="regConfirmEmail" placeholder="Enter your confirm email">
                </div>

                <div class="field">
                    <label>Password:-</label>
                    <input type="password" id="regPassword" placeholder="Enter your password">
                </div>

            </div>

            <button onclick="register()">Sing Up</button>

            <div class="switch">
                Already Have a Account? <a onclick="showLogin()">Sing In</a>
            </div>

        </div>
    </section>
    <!-- JavaScript -->
    <script src="/assets/js/login.js"></script>

</body>

</html>

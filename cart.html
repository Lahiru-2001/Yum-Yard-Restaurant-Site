<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Item page</title>

    <!-- External CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sue+Ellen+Francisco&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sigmar&family=Sue+Ellen+Francisco&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/cart.css">
</head>


<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar-custom">
            <div class="logo">
                <img src="/assets/images/logo 2.png" alt="logo">
            </div>

            <ul class="nav-links">
                <li><a href="home_page.html">Home</a></li>
                <li><a class="active" href="food_menu.html">Food Menu</a></li>
                <li><a href="about_us.html">About Us</a></li>
                <li><a href="contact_us.html">Contact Us</a></li>
            </ul>

            <div class="auth-links">
                <a class="icon-circle" href="profile.html">
                    <i class="fa-solid fa-user"></i>
                </a>
                <a href="index.html" class="logout-btn">Logout</a>
            </div>
        </nav>
    </header>


    <h2 class="title-heading">Check Out <span>Yummy Item</span></h2>

    <!-- MAIN -->
    <div class="cart-container">

        <!-- LEFT -->
        <div class="food-section">

            <h2 class="title">Magnam Tiste</h2>

            <img src="/assets/images/menu-item-1.png" class="food-img">

            <div class="qty-vertical">
                <button onclick="changeQty(1)">+</button>
                <span id="qty">1</span>
                <button onclick="changeQty(-1)">−</button>
            </div>

            <h4>Ingredients</h4>
            <p class="ingredients">Lorem, deren, trataro, filede, nerada</p>

            <div class="price">Rs: <span id="price">2000.00</span></div>

            <div class="stars">
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
            </div>

            <div class="social-icons">
                <i class="bi bi-facebook"></i>
                <i class="bi bi-instagram"></i>
                <i class="bi bi-twitter"></i>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="order-box">

            <h3>Order Details</h3>
            <div class="line"></div>

            <p>Subtotal <span>Rs:- <span class="item-price" id="subtotal">2000.00</span></span></p>
            <p>Delivery Price <span>Rs:- <span class="item-price" id="delivery">300.00</span></span></p>

            <div class="line"></div>

            <p class="total">Total Price <span>Rs:- <span class="item-price" id="total">2300.00</span></span></p>

            <label class="terms">
                <input type="checkbox"> I agree to the Terms and Condition
            </label>

            <button class="continue-btn">CONTINUE</button>

        </div>

    </div>
    <!-- External JS -->
    <script src="/assets/js/cart.js"></script>

</body>

</html>

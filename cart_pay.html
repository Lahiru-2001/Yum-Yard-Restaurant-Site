<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments</title>

    <!-- External CSS and Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sue+Ellen+Francisco&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sigmar&family=Sue+Ellen+Francisco&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/cart_pay.css">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar-custom">
            <div class="logo">
                <img src="/assets/images/logo 2.png" alt="logo">
            </div>

            <ul class="nav-links">
                <li><a href="home_page.html">Home</a></li>
                <li><a class="active" href="food_menu.html">Food Menu</a></li>
                <li><a href="about_us.html">About Us</a></li>
                <li><a href="contact_us.html">Contact Us</a></li>
            </ul>

            <div class="auth-links">
                <a class="icon-circle" href="profile.html">
                    <i class="fa-solid fa-user"></i>
                </a>
                <a href="index.html" class="logout-btn">Logout</a>
            </div>
        </nav>
    </header>

    <!-- Payment TITLE -->
    <h2 class="title">Check <span>Out</span></h2>

    <!-- Payment FORM -->
    <div class="checkout-container">

        <!-- LEFT SIDE -->
        <div class="form-box">
            <h3>Information</h3>

           <input type="text" id="first_name" placeholder="First Name">
<input type="text" id="last_name" placeholder="Last Name">
<input type="email" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="address" placeholder="Address">
        </div>

        <!-- RIGHT SIDE -->
        <div class="form-box">
            <h3>Payment Details</h3>

            <input type="text" id="card_name" placeholder="Card Owner Name">
<input type="text" id="card_number" placeholder="Card Number">

         <div class="row-input">
    <input type="text" id="cvv" placeholder="CVV">
    <input type="date" id="exp_date">
</div>
        </div>

    </div>

    <!-- BUTTON -->
    <button class="confirm-btn" onclick="confirmOrder()">Confirm</button>

    <!-- External JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/cart_pay.js"></script>

</body>

</html>

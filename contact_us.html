<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <!-- External CSS and Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sue+Ellen+Francisco&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sigmar&family=Sue+Ellen+Francisco&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/contact_us.css">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar-custom">
            <div class="logo">
                <img src="/assets/images/logo 2.png" alt="logo">
            </div>

            <ul class="nav-links">
                <li><a class="active" href="home_page.html">Home</a></li>
                <li><a href="food_menu.html">Food Menu</a></li>
                <li><a href="about_us.html">About Us</a></li>
                <li><a href="contact_us.html">Contact Us</a></li>
            </ul>

            <div class="auth-links">
                <a class="icon-circle" href="profile.html">
                    <i class="fa-solid fa-user"></i>
                </a>
                <a href="index.html" class="logout-btn">Logout</a>
            </div>
        </nav>
    </header>

    <!-- CONTACT -->
    <section class="contact-section">

        <h2 class="contact-title">Need Help? <span>Contact Us</span></h2>

        <p class="contact-subtitle">
            We're here to help! Reach out to us with any questions or concerns.
        </p>

        <!-- CONTACT INFO -->
        <div class="contact-info">
            <div class="info-box">
                <i class="fa fa-phone"></i>
                <span>Call Us</span> 076-4586236
            </div>

            <div class="info-box">
                <i class="fa fa-map-marker-alt"></i>
                <span>Address</span> 55/Colombo Road, Negombo.
            </div>

            <div class="info-box">
                <i class="fa fa-envelope"></i>
                <span>Email</span> yumyard@gmail.com
            </div>
        </div>

        <!-- CONTACT FORM -->
        <div class="contact-box">
            <form id="contactForm">
                <div class="form-row">
                    <input type="text" id="name" placeholder="Enter your name" required>
                    <input type="email" id="email" placeholder="Enter your email address" required>
                </div>

                <textarea id="message" placeholder="Enter your message"></textarea>

                <button type="submit">Submit</button>
            </form>
        </div>

    </section>


    <!--     External JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/contact_us.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Item page</title>
    <!-- External CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sue+Ellen+Francisco&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sigmar&family=Sue+Ellen+Francisco&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/menu_item.css">
</head>


<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar-custom">
            <div class="logo">
                <img src="/assets/images/logo 2.png" alt="logo">
            </div>

            <ul class="nav-links">
                <li><a href="home_page.html">Home</a></li>
                <li><a class="active" href="food_menu.html">Food Menu</a></li>
                <li><a href="about_us.html">About Us</a></li>
                <li><a href="contact_us.html">Contact Us</a></li>
            </ul>

            <div class="auth-links">
                <a class="icon-circle" href="profile.html">
                    <i class="fa-solid fa-user"></i>
                </a>
                <a href="index.html" class="logout-btn">Logout</a>
            </div>
        </nav>
    </header>

    <!-- MENU ITEM SECTION -->
    <section class="menu-item">

        <h2 class="menu-item-title">
            Magnam <span>Tiste Details</span>
        </h2>

        <div class="menu-item-container">

            <!-- LEFT IMAGE -->
            <div class="menu-item-image">
                <img src="/assets/images/menu-item-3.png" alt="food">
            </div>

            <!-- RIGHT CONTENT -->
            <div class="menu-item-content">

                <h3>Ingredients</h3>

                <p class="ingredients">
                    Lorem, deren, trataro, filede, nerada
                </p>

                <p class="price">Rs:2000.00</p>

                <!-- STARS -->
                <div class="stars">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                </div>

                <!-- SOCIAL -->
                <div class="menu-social">
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-instagram"></i>
                    <i class="fa-brands fa-twitter"></i>
                </div>

                <!-- BUTTON -->
                <button class="order-btn">Order Now</button>

            </div>

        </div>

    </section>

    <!--  JavaScript -->
    <script>
        document.querySelector(".order-btn").addEventListener("click", function () {
            alert("Order placed successfully!");
            window.location.href = "cart.html";
        });
    </script>
</body>

</html>
